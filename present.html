<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라로제 교육 진행 | LA ROSÉE</title>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --blue:#0E94CD; --blue-dark:#0a78a8; --blue-light:#e8f4fb;
  --white:#fff; --gray:#f4f7fb; --text:#1a2233; --muted:#6b7c93;
  --border:#e2eaf4; --green:#16a34a; --red:#ef4444; --amber:#d97706;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:var(--gray);color:var(--text);min-height:100vh;}

/* ─ Header ─ */
.hdr{background:#fff;border-bottom:1px solid var(--border);height:64px;display:flex;
  align-items:center;justify-content:space-between;padding:0 32px;
  position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(14,148,205,.08);}
.hdr img{height:44px;cursor:pointer;}
.hdr-right{display:flex;align-items:center;gap:12px;}
.back-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;
  background:var(--gray);border:1px solid var(--border);font-size:14px;font-weight:600;
  cursor:pointer;color:var(--text);transition:.15s;font-family:inherit;}
.back-btn:hover{background:var(--border);}
.hdr-session-name{font-size:15px;font-weight:700;color:var(--text);}

/* ─ Screens ─ */
.screen{display:none;}
.screen.on{display:block;}

/* ─ HOME ─ */
#s-home-inner{max-width:900px;margin:0 auto;padding:48px 24px;}
.home-title{font-size:32px;font-weight:800;margin-bottom:8px;}
.home-sub{font-size:16px;color:var(--muted);margin-bottom:40px;}
.session-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;}
.session-card{background:#fff;border:2px solid var(--border);border-radius:18px;
  padding:28px 24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.session-card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:var(--blue);}
.session-card.dim::before{background:var(--muted);}
.session-card:hover{border-color:var(--blue);transform:translateY(-3px);
  box-shadow:0 10px 36px rgba(14,148,205,.16);}
.session-card.dim:hover{border-color:var(--muted);box-shadow:0 8px 28px rgba(0,0,0,.08);}
.sc-icon{font-size:38px;margin-bottom:16px;}
.sc-name{font-size:20px;font-weight:800;margin-bottom:8px;}
.sc-meta{font-size:13px;color:var(--muted);margin-bottom:12px;}
.status-badge{display:inline-flex;align-items:center;padding:4px 12px;
  border-radius:20px;font-size:12px;font-weight:700;}
.badge-active{background:#dcfce7;color:#166534;}
.badge-dim{background:#f1f5f9;color:#64748b;}

/* ─ SESSION ─ */
.day-bar{background:#fff;border-bottom:1px solid var(--border);padding:0 32px;
  display:flex;gap:8px;align-items:center;height:52px;}
.day-tab{padding:7px 22px;border-radius:8px;font-size:14px;font-weight:700;
  cursor:pointer;border:2px solid var(--border);background:#fff;color:var(--muted);transition:.15s;}
.day-tab.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.items-wrap{max-width:900px;margin:0 auto;padding:32px 24px;}
.item-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;
  padding:20px 24px;display:flex;align-items:center;gap:20px;margin-bottom:12px;
  cursor:pointer;transition:all .2s;}
.item-card:hover{border-color:var(--blue);box-shadow:0 4px 20px rgba(14,148,205,.12);transform:translateX(4px);}
.item-icon{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;
  justify-content:center;font-size:24px;flex-shrink:0;}
.item-name{font-size:17px;font-weight:700;}
.item-desc{font-size:13px;color:var(--muted);margin-top:4px;}
.type-badge{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;flex-shrink:0;}
.tb-link{background:#eff6ff;color:var(--blue);}
.tb-roleplay{background:#f0fdf4;color:var(--green);}
.tb-flashcard{background:#fdf4ff;color:#9333ea;}
.tb-quiz{background:#fef2f2;color:var(--red);}
.tb-lecture{background:#fffbeb;color:var(--amber);}

/* ─ VIEWER (fullscreen) ─ */
#s-viewer{position:fixed;inset:0;background:#0a0e1a;z-index:200;display:none;flex-direction:column;}
#s-viewer.on{display:flex;}
.vhdr{background:rgba(0,0,0,.65);backdrop-filter:blur(8px);height:54px;
  display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;}
.vhdr-title{font-size:15px;font-weight:700;color:#fff;}
.vhdr-right{display:flex;align-items:center;gap:16px;}
.kbd-hints{display:flex;gap:14px;align-items:center;}
.kbd{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:rgba(255,255,255,.5);}
.key{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  border-radius:4px;padding:2px 7px;font-size:11px;font-family:monospace;}
.v-close-btn{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:#fff;font-size:13px;cursor:pointer;transition:.15s;font-family:inherit;}
.v-close-btn:hover{background:rgba(255,255,255,.22);}
.vbody{flex:1;overflow:hidden;position:relative;}

/* LINK */
#v-link{width:100%;height:100%;display:none;}
#v-link iframe{width:100%;height:100%;border:none;background:#fff;}
#v-link-ext{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;background:#1a2233;display:none;}
.ext-icon{font-size:56px;}
.ext-title{font-size:20px;font-weight:700;color:#fff;}
.ext-url{font-size:14px;color:var(--blue);word-break:break-all;text-align:center;max-width:560px;}
.ext-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;
  border-radius:12px;background:var(--blue);color:#fff;font-size:16px;font-weight:700;
  cursor:pointer;border:none;transition:.15s;font-family:inherit;}
.ext-btn:hover{background:var(--blue-dark);}

/* ROLEPLAY */
#v-roleplay{position:absolute;inset:0;display:none;flex-direction:column;background:#f4f7fb;overflow:hidden;}
.rp-tabs{display:flex;gap:8px;padding:16px 24px 0;background:#0a1628;overflow-x:auto;flex-shrink:0;}
.rp-tab{padding:10px 20px;border-radius:10px 10px 0 0;font-size:15px;font-weight:600;cursor:pointer;
  white-space:nowrap;border:none;font-family:inherit;transition:.15s;}
.rp-tab.on{background:#0E94CD;color:#fff;}
.rp-tab.off{background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);}
.rp-tab.off:hover{background:rgba(255,255,255,.18);}
.rp-body{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px 24px;overflow:hidden;}
.rp-panel{background:#fff;border-radius:14px;padding:20px 24px;overflow-y:auto;
  border:0.5px solid #e2eaf4;}
.rp-panel-title{font-size:13px;font-weight:700;color:#0E94CD;letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #e8f4fb;}
.rp-check-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;
  border-bottom:0.5px solid #f0f4f8;cursor:pointer;user-select:none;}
.rp-check-item:last-child{border-bottom:none;}
.rp-chk{width:22px;height:22px;border:2px solid #b0c8db;border-radius:5px;flex-shrink:0;
  margin-top:1px;display:flex;align-items:center;justify-content:center;transition:.15s;}
.rp-chk.checked{background:#0E94CD;border-color:#0E94CD;}
.rp-chk.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:700;}
.rp-check-text{font-size:16px;line-height:1.5;color:#1a2233;}
.rp-check-text.checked{color:#888;text-decoration:line-through;}
.rp-script-block{margin-bottom:16px;}
.rp-script-label{font-size:12px;font-weight:700;color:#6b7c93;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em;}
.rp-script-text{background:#e8f4fb;border-left:4px solid #0E94CD;border-radius:0 10px 10px 0;
  padding:14px 16px;font-size:17px;line-height:1.6;color:#1a2233;font-style:italic;}
.nav-btn{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.12);
  border:2px solid rgba(255,255,255,.25);color:#fff;font-size:22px;cursor:pointer;
  transition:.15s;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.nav-btn:hover:not(:disabled){background:rgba(255,255,255,.25);}
.nav-btn:disabled{opacity:.3;cursor:not-allowed;}
.nav-counter{color:rgba(255,255,255,.7);font-size:15px;min-width:80px;text-align:center;}

/* LECTURE (flashcard) */
#v-lecture{position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;background:#0a0e1a;gap:28px;}
.fc-wrap{width:min(800px,90vw);height:min(420px,52vh);perspective:1200px;cursor:pointer;}
.fc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s ease;}
.fc-inner.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:20px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;}
.fc-front{background:linear-gradient(135deg,#0E94CD 0%,#0a78a8 100%);color:#fff;}
.fc-back{background:#fff;color:var(--text);transform:rotateY(180deg);border:3px solid var(--blue);}
.fc-label{font-size:13px;font-weight:700;opacity:.6;margin-bottom:16px;letter-spacing:.1em;text-transform:uppercase;}
.fc-text{font-size:clamp(18px,3.5vw,28px);font-weight:800;text-align:center;line-height:1.45;}
.fc-hint{font-size:13px;opacity:.5;margin-top:16px;}
.fc-nav{display:flex;align-items:center;gap:24px;}
.fc-counter{color:rgba(255,255,255,.6);font-size:15px;min-width:80px;text-align:center;}

/* QR */
#v-qr{position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;background:#fff;gap:20px;}
.qr-title{font-size:26px;font-weight:800;color:var(--text);}
.qr-sub{font-size:16px;color:var(--muted);}
.qr-box{background:#fff;padding:24px;border-radius:20px;
  box-shadow:0 8px 48px rgba(14,148,205,.18);}
.qr-url{font-size:13px;color:var(--blue);background:var(--blue-light);
  padding:8px 20px;border-radius:8px;word-break:break-all;text-align:center;max-width:500px;}

/* NO DATA */
#v-empty{position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;background:#1a2233;}
.empty-icon{font-size:64px;}
.empty-h{font-size:22px;font-weight:700;color:#fff;}
.empty-p{font-size:15px;color:rgba(255,255,255,.6);text-align:center;max-width:400px;}

/* Loading */
#loading{position:fixed;inset:0;background:#fff;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
#loading img{height:52px;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
</style>
</head>
<body>

<div id="loading">
  <img src="logo.png" alt="라로제">
  <span style="font-size:13px;color:#6b7c93;">불러오는 중...</span>
</div>

<!-- Header -->
<div class="hdr" id="main-hdr">
  <img src="logo.png" alt="라로제" onclick="goHome()">
  <div class="hdr-right" id="hdr-right"></div>
</div>

<!-- HOME -->
<div class="screen on" id="s-home">
  <div id="s-home-inner">
    <div class="home-title">📺 교육 진행</div>

    <div class="session-grid" id="session-grid"></div>
  </div>
</div>

<!-- SESSION -->
<div class="screen" id="s-session">
  <div class="day-bar" id="day-bar"></div>
  <div class="items-wrap"><div id="items-list"></div></div>
</div>

<!-- VIEWER -->
<div id="s-viewer">
  <div class="vhdr">
    <div class="vhdr-title" id="vhdr-title"></div>
    <div class="vhdr-right">
      <div class="kbd-hints" id="kbd-hints"></div>
      <button class="v-close-btn" onclick="closeViewer()">✕ 닫기 &nbsp;<span style="opacity:.5;font-size:11px;">(ESC)</span></button>
    </div>
  </div>
  <div class="vbody" id="vbody">

    <!-- LINK -->
    <div id="v-link">
      <iframe id="v-link-frame" allowfullscreen></iframe>
      <div id="v-link-ext">
        <div class="ext-icon">📎</div>
        <div class="ext-title" id="ext-title">외부 링크</div>
        <div class="ext-url" id="ext-url-text"></div>
        <button class="ext-btn" onclick="openExt()">↗ 새 탭으로 열기</button>
      </div>
    </div>

    <!-- ROLEPLAY -->
    <div id="v-roleplay">
      <div class="rp-tabs" id="rp-tabs"></div>
      <div class="rp-body">
        <div class="rp-panel" id="rp-left"></div>

    <!-- LECTURE -->
    <div id="v-lecture">
      <div class="fc-wrap" onclick="flipFC()">
        <div class="fc-inner" id="fc-inner">
          <div class="fc-face fc-front">
            <div class="fc-label">질문</div>
            <div class="fc-text" id="fc-front-text"></div>
            <div class="fc-hint">클릭하여 답 보기 ↩</div>
          </div>
          <div class="fc-face fc-back">
            <div class="fc-label" style="color:var(--blue);">답변</div>
            <div class="fc-text" id="fc-back-text"></div>
          </div>
        </div>
      </div>
      <div class="fc-nav">
        <button class="nav-btn" id="fc-prev" onclick="fcNav(-1)">←</button>
        <div class="fc-counter" id="fc-counter">1 / 1</div>
        <button class="nav-btn" id="fc-next" onclick="fcNav(1)">→</button>
      </div>
    </div>

    <!-- QR -->
    <div id="v-qr">
      <div class="qr-title" id="qr-title"></div>
      <div class="qr-sub" id="qr-sub">핸드폰 카메라로 QR을 스캔하세요</div>
      <div class="qr-box"><div id="qr-canvas"></div></div>
      <div class="qr-url" id="qr-url"></div>
    </div>

    <!-- EMPTY -->
    <div id="v-empty">
      <div class="empty-icon" id="empty-icon">🔗</div>
      <div class="empty-h" id="empty-h">아직 설정되지 않았습니다</div>
      <div class="empty-p" id="empty-p">관리자 페이지에서 이 항목을 설정해주세요.</div>
    </div>

  </div>
</div>

<script>
// ── Firebase ──
const FC_CFG = {
  apiKey:'AIzaSyCT3COLehsX7eHbrrKTem4ZZvPWSKAgjh8',
  authDomain:'ra-rosee.firebaseapp.com',
  projectId:'ra-rosee',
  storageBucket:'ra-rosee.firebasestorage.app',
  messagingSenderId:'121644280571',
  appId:'1:121644280571:web:0535234c31d382c35c5e5e'
};
let db = null;
try { firebase.initializeApp(FC_CFG); db = firebase.firestore(); } catch(e) {}

// ── Default sessions ──
const DEFAULT_SESSIONS = [
  {
    id:'new-hire', name:'신규입사자 교육', status:'active', icon:'📚', order:0,
    days:[
      { name:'DAY 1', items:[
        {type:'link',     name:'브랜드 교육',      desc:'PPT',              url:'https://laroseekr-my.sharepoint.com/personal/taeyun_kim_larosee_co_kr/_layouts/15/Doc.aspx?sourcedoc=%7B4593676f-e99d-48ea-ba15-1e4f83469b5d%7D&action=default', icon:'📋'},
        {type:'link',     name:'인센티브 교육',     desc:'PPT',              url:'https://laroseekr-my.sharepoint.com/personal/taeyun_kim_larosee_co_kr/_layouts/15/Doc.aspx?sourcedoc=%7Bf0e7cde8-f819-4aed-83ff-51c289c1d069%7D&action=default', icon:'📋'},
        {type:'link',     name:'제품 교육',         desc:'PDF',              url:'https://laroseekr-my.sharepoint.com/personal/taeyun_kim_larosee_co_kr/_layouts/15/Doc.aspx?sourcedoc=%7Bfa4bb4ec-ec9b-4376-9fb8-e2138eb5f016%7D&action=default', icon:'📄'},
        {type:'link',     name:'매뉴얼 교육',       desc:'PPT',              url:'https://laroseekr-my.sharepoint.com/personal/taeyun_kim_larosee_co_kr/_layouts/15/Doc.aspx?sourcedoc=%7Bb6deec2d-0ab1-4944-b8bc-0c8fbbbd2c1d%7D&action=default', icon:'📋'},
        {type:'link',     name:'전산교육',          desc:'트위닛 가이드',    url:'https://laroseekr-my.sharepoint.com/personal/taeyun_kim_larosee_co_kr/_layouts/15/Doc.aspx?sourcedoc=%7B711bde55-c5ec-4223-ad52-0a09e43a7a05%7D&action=default', icon:'💻'}
      ]},
      { name:'DAY 2', items:[
        {type:'roleplay', name:'롤플레이 가이드',       desc:'카테고리별 핵심포인트·멘트',   icon:'🎭', categories:[
          {name:'핸드빌 기본', checkpoints:['고객 동선을 막지 않음','3걸음 전 눈 맞춤 및 인사','한걸음 다가가기 · 고개 약 15도','손을 뻗어 손등 위치에 테스트 진행'], scripts:[{label:'기본 멘트',text:'안녕하세요, 촉촉한 바디로션 발라드릴게요~'},{label:'대안 멘트',text:'안녕하세요, 프랑스 바디로션 발라드릴게요~'}]},
          {name:'빠른 고객', checkpoints:[], scripts:[]},
          {name:'느린 고객', checkpoints:[], scripts:[]},
          {name:'수분스틱', checkpoints:[], scripts:[]},
          {name:'세럼', checkpoints:[], scripts:[]},
          {name:'머드스틱', checkpoints:[], scripts:[]},
          {name:'사워오일', checkpoints:[], scripts:[]}
        ]},
        {type:'link',     name:'이의제기 교육',          desc:'PPT',                        url:'https://laroseekr-my.sharepoint.com/personal/taeyun_kim_larosee_co_kr/_layouts/15/Doc.aspx?sourcedoc=%7Bc5354b74-e3d6-4425-b7d1-6bd5f23e9d1c%7D&action=default', icon:'📋'},
        {type:'flashcard',name:'이의제기 플래시카드 배포', desc:'QR 배포 후 핸드폰으로 연습', fcId:'', icon:'🗂'},
        {type:'quiz',     name:'마무리 퀴즈 배포',       desc:'QR 배포 후 응시',             quizId:'', icon:'✅'},
        {type:'lecture',  name:'마무리 강의',            desc:'플래시카드 강의 모드',         fcId:'', icon:'🎓'}
      ]}
    ]
  },
  { id:'retrain-1', name:'재교육 1차', status:'preparing', icon:'🔄', order:1, days:[] },
  { id:'retrain-2', name:'재교육 2차', status:'preparing', icon:'🔄', order:2, days:[] }
];

// ── State ──
let sessions = [];
let curSession = null, curDayIdx = 0;
let rpImages = [], rpIdx = 0;
let fcCards = [], fcIdx = 0, fcFlipped = false;
let extUrl = '';

// ── URL 패치: 저장된 세션에 URL 없으면 DEFAULT_SESSIONS에서 채움 ──
function patchUrlsFromDefault(loadedSessions) {
  return loadedSessions.map(sess => {
    const def = DEFAULT_SESSIONS.find(d => d.id === sess.id);
    if (!def) return sess;
    return {
      ...sess,
      days: (sess.days || []).map((day, di) => {
        const defDay = (def.days || [])[di];
        if (!defDay) return day;
        return {
          ...day,
          items: (day.items || []).map((item, ii) => {
            const defItem = (defDay.items || [])[ii];
            if (!defItem) return item;
            // link 타입이고 URL이 비어있거나 구글 링크면 OneDrive URL로 교체
            if (item.type === 'link' && (!item.url || item.url.includes('drive.google.com') || item.url.includes('docs.google.com'))) {
              return { ...item, url: defItem.url || item.url };
            }
            return item;
          })
        };
      })
    };
  });
}

// ── Load ──
async function loadSessions() {
  if (db) {
    try {
      const snap = await db.collection('sessions').orderBy('order').get();
      if (!snap.empty) {
        sessions = patchUrlsFromDefault(snap.docs.map(d => ({id:d.id, ...d.data()})));
        renderHome(); return;
      }
    } catch(e) { console.warn('Firebase:', e); }
  }
  const saved = localStorage.getItem('lr_sessions');
  if (saved) { try { sessions = patchUrlsFromDefault(JSON.parse(saved)); renderHome(); return; } catch(e){} }
  sessions = DEFAULT_SESSIONS;
  renderHome();
}

// ── HOME ──
function renderHome() {
  const grid = document.getElementById('session-grid');
  if (!sessions.length) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:15px;">등록된 세션이 없습니다.</div>';
    return;
  }
  grid.innerHTML = sessions.map((s, i) => `
    <div class="session-card ${s.status!=='active'?'dim':''}" onclick="openSession(${i})">
      <div class="sc-icon">${s.icon||'📚'}</div>
      <div class="sc-name">${s.name}</div>
      <div class="sc-meta">${s.days&&s.days.length ? s.days.map(d=>d.name).join(' · ') : '콘텐츠 없음'}</div>
      <span class="status-badge ${s.status==='active'?'badge-active':'badge-dim'}">
        ${s.status==='active'?'✓ 진행중':'준비 중'}
      </span>
    </div>
  `).join('');
}

function goHome() {
  curSession = null;
  showScreen('s-home');
  document.getElementById('hdr-right').innerHTML = '';
}

// ── SESSION ──
function openSession(idx) {
  curSession = sessions[idx];
  if (!curSession.days || !curSession.days.length) {
    alert('이 세션은 아직 준비 중입니다.\n관리자 페이지에서 콘텐츠를 추가해주세요.');
    return;
  }
  curDayIdx = 0;
  renderSession();
  showScreen('s-session');
  document.getElementById('hdr-right').innerHTML = `
    <button class="back-btn" onclick="goHome()">← 세션 목록</button>
    <span class="hdr-session-name">${curSession.name}</span>
  `;
}

function renderSession() {
  const dayBar = document.getElementById('day-bar');
  dayBar.innerHTML = curSession.days.map((d,i) =>
    `<div class="day-tab ${i===curDayIdx?'on':''}" onclick="setDay(${i})">${d.name}</div>`
  ).join('');
  renderItems();
}

function setDay(idx) {
  curDayIdx = idx;
  renderSession();
}

const TYPE_META = {
  link:      {label:'자료 열기', cls:'tb-link'},
  roleplay:  {label:'롤플레이',  cls:'tb-roleplay'},
  flashcard: {label:'QR 배포',  cls:'tb-flashcard'},
  quiz:      {label:'QR 배포',  cls:'tb-quiz'},
  lecture:   {label:'강의 모드', cls:'tb-lecture'}
};
const ICON_BG = {
  link:'#eff6ff', roleplay:'#f0fdf4', flashcard:'#fdf4ff', quiz:'#fef2f2', lecture:'#fffbeb'
};

function renderItems() {
  const day = curSession.days[curDayIdx];
  const wrap = document.getElementById('items-list');
  if (!day || !day.items || !day.items.length) {
    wrap.innerHTML = '<div style="text-align:center;padding:60px 24px;color:var(--muted);font-size:15px;">이 DAY에 등록된 항목이 없습니다.</div>';
    return;
  }
  wrap.innerHTML = day.items.map((item, i) => {
    const tm = TYPE_META[item.type] || {label:item.type, cls:'tb-link'};
    return `
      <div class="item-card" onclick="openItem(${i})">
        <div class="item-icon" style="background:${ICON_BG[item.type]||'#f4f7fb'}">${item.icon||'📋'}</div>
        <div style="flex:1;">
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc||''}</div>
        </div>
        <span class="type-badge ${tm.cls}">${tm.label}</span>
        <span style="color:var(--muted);font-size:20px;">›</span>
      </div>
    `;
  }).join('');
}

// ── VIEWER ──
function openItem(idx) {
  const item = curSession.days[curDayIdx].items[idx];
  document.getElementById('vhdr-title').textContent = item.name;
  // hide all panels
  ['v-link','v-roleplay','v-lecture','v-qr','v-empty'].forEach(id => {
    const el = document.getElementById(id);
    el.style.display = 'none';
    if (el.style.flexDirection !== undefined) el.style.flexDirection = '';
  });
  document.getElementById('kbd-hints').innerHTML = '';

  if      (item.type === 'link')      openLinkViewer(item);
  else if (item.type === 'roleplay')  openRoleplay(item);
  else if (item.type === 'flashcard') openQR(item, 'flashcard');
  else if (item.type === 'quiz')      openQR(item, 'quiz');
  else if (item.type === 'lecture')   openLecture(item);

  document.getElementById('s-viewer').classList.add('on');
}

function closeViewer() {
  document.getElementById('s-viewer').classList.remove('on');
  document.getElementById('v-link-frame').src = '';
}

// LINK viewer — 새 탭으로 바로 열기
function openLinkViewer(item) {
  extUrl = item.url || '';

  if (!extUrl) { showEmpty('🔗','링크가 설정되지 않았습니다','관리자 페이지에서 링크를 입력해주세요.'); return; }

  // 바로 새 탭으로 열고 뷰어도 안내 화면으로 표시
  window.open(extUrl, '_blank');

  const ext = document.getElementById('v-link-ext');
  const frame = document.getElementById('v-link-frame');
  frame.style.display = 'none';
  ext.style.display = 'flex';
  document.getElementById('v-link').style.display = 'block';
  document.getElementById('ext-title').textContent = item.name + ' — 새 탭에서 열렸습니다';
  document.getElementById('ext-url-text').textContent = extUrl;
  setKbd([['ESC','닫기']]);
}
function openExt() { if(extUrl) window.open(extUrl, '_blank'); }

// ROLEPLAY
let rpCategories = [], rpCatIdx = 0, rpChecked = {};
function openRoleplay(item) {
  rpCategories = item.categories || [];
  if (!rpCategories.length) { showEmpty('🎭','내용이 없습니다','관리자 페이지에서 롤플레이 내용을 추가해주세요.'); return; }
  rpCatIdx = 0; rpChecked = {};
  const el = document.getElementById('v-roleplay');
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
  renderRP();
  setKbd([['←→','카테고리 이동'],['ESC','닫기']]);
}
function renderRP() {
  const cats = rpCategories;
  const cat = cats[rpCatIdx];
  // tabs
  document.getElementById('rp-tabs').innerHTML = cats.map((c,i)=>
    `<button class="rp-tab ${i===rpCatIdx?'on':'off'}" onclick="rpSetCat(${i})">${c.name}</button>`
  ).join('');
  // left: checkpoints
  const left = document.getElementById('rp-left');
  const pts = cat.checkpoints || [];
  left.innerHTML = `<div class="rp-panel-title">핵심 포인트</div>` +
    (pts.length ? pts.map((p,i)=>{
      const key = rpCatIdx+'_'+i;
      const ck = rpChecked[key];
      return `<div class="rp-check-item" onclick="rpToggle(${i})">
        <div class="rp-chk ${ck?'checked':''}"></div>
        <span class="rp-check-text ${ck?'checked':''}">${p}</span>
      </div>`;
    }).join('') : '<p style="color:#999;font-size:14px;">항목 없음</p>');
  // right: scripts
  const right = document.getElementById('rp-right');
  const scripts = cat.scripts || [];
  right.innerHTML = `<div class="rp-panel-title">멘트</div>` +
    (scripts.length ? scripts.map(s=>
      `<div class="rp-script-block">
        <div class="rp-script-label">${s.label||''}</div>
        <div class="rp-script-text">${s.text||''}</div>
      </div>`
    ).join('') : '<p style="color:#999;font-size:14px;">멘트 없음</p>');
}
function rpSetCat(i) { rpCatIdx = i; renderRP(); }
function rpToggle(i) {
  const key = rpCatIdx+'_'+i;
  rpChecked[key] = !rpChecked[key];
  renderRP();
}

// LECTURE
function openLecture(item) {
  const sets = JSON.parse(localStorage.getItem('lr_fcsets')||'[]');
  const set = sets.find(s=>s.id===item.fcId) || sets[0];
  if (!set || !(set.cards||[]).length) {
    showEmpty('🎓','플래시카드가 없습니다','관리자 페이지에서 플래시카드 세트를 먼저 만들어주세요.');
    return;
  }
  fcCards = set.cards;
  fcIdx = 0; fcFlipped = false;
  const el = document.getElementById('v-lecture');
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
  renderFC();
  setKbd([['Space','뒤집기'],['←','이전'],['→','다음'],['ESC','닫기']]);
}
function renderFC() {
  const c = fcCards[fcIdx];
  document.getElementById('fc-front-text').textContent = c.front || c.q || '';
  document.getElementById('fc-back-text').textContent  = c.back  || c.a || '';
  document.getElementById('fc-counter').textContent = (fcIdx+1)+' / '+fcCards.length;
  document.getElementById('fc-inner').classList.remove('flipped');
  fcFlipped = false;
  document.getElementById('fc-prev').disabled = fcIdx === 0;
  document.getElementById('fc-next').disabled = fcIdx === fcCards.length-1;
}
function flipFC() {
  fcFlipped = !fcFlipped;
  document.getElementById('fc-inner').classList.toggle('flipped', fcFlipped);
}
function fcNav(d) { fcIdx = Math.max(0, Math.min(fcCards.length-1, fcIdx+d)); renderFC(); }

// QR
function openQR(item, type) {
  const base = 'https://taeyun-larosee.github.io/larosee-quiz/';
  let url = base;
  if (type==='flashcard') url += '?fc=' + (item.fcId || 'larosee');
  else if (type==='quiz') url += '?quiz=' + (item.quizId || 'larosee');

  document.getElementById('qr-title').textContent = item.name;
  document.getElementById('qr-url').textContent = url;

  const canvas = document.getElementById('qr-canvas');
  canvas.innerHTML = '';
  new QRCode(canvas, { text:url, width:260, height:260, correctLevel:QRCode.CorrectLevel.H });

  const el = document.getElementById('v-qr');
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
  setKbd([['ESC','닫기']]);
}

// EMPTY
function showEmpty(icon, h, p) {
  document.getElementById('empty-icon').textContent = icon;
  document.getElementById('empty-h').textContent = h;
  document.getElementById('empty-p').textContent = p;
  const el = document.getElementById('v-empty');
  el.style.display = 'flex';
  el.style.flexDirection = 'column';
}

function setKbd(hints) {
  document.getElementById('kbd-hints').innerHTML = hints.map(([k,l]) =>
    `<span class="kbd"><span class="key">${k}</span> ${l}</span>`
  ).join('');
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  const viewer = document.getElementById('s-viewer');
  if (!viewer.classList.contains('on')) return;
  if (e.key==='Escape') { closeViewer(); return; }

  const rpOn = document.getElementById('v-roleplay').style.display !== 'none';
  const fcOn = document.getElementById('v-lecture').style.display  !== 'none';

  if (rpOn) {
    if (e.key==='ArrowLeft')  rpSetCat(Math.max(0, rpCatIdx-1));
    if (e.key==='ArrowRight') rpSetCat(Math.min(rpCategories.length-1, rpCatIdx+1));
  }
  if (fcOn) {
    if (e.key===' ') { e.preventDefault(); flipFC(); }
    if (e.key==='ArrowLeft')  fcNav(-1);
    if (e.key==='ArrowRight') fcNav(1);
  }
});

// ── Helpers ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}

// ── Init ──
window.addEventListener('DOMContentLoaded', async () => {
  await loadSessions();
  document.getElementById('loading').style.display = 'none';
});
</script>
</body>
</html>
